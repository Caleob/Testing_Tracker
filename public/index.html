<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Tracker Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary: #3b82f6;
            --warning: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #334155;
        }

        h1 { margin: 0; color: var(--primary); }

        .controls { display: flex; gap: 1rem; }

        button {
            background-color: var(--surface-color);
            color: var(--text-main);
            border: 1px solid #334155;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover { background-color: #334155; }
        
        .upload-btn { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            display: inline-block;
        }
        .upload-btn:hover { background-color: #2563eb; }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--surface-color);
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        th { background-color: #0f172a; font-weight: 600; color: var(--text-muted); }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .bg-gray { background-color: #334155; }
        .bg-green { background-color: rgba(16, 185, 129, 0.2); border: 1px solid var(--success); color: var(--success); }
        .bg-orange { background-color: rgba(245, 158, 11, 0.2); border: 1px solid var(--warning); color: var(--warning); }
        
        .row-warning { background-color: rgba(245, 158, 11, 0.05); }

        .copy-btn {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            margin-left: 0.5rem;
            background: #0f172a;
            color: var(--primary);
        }

        .audit-link {
            cursor: pointer;
            text-decoration: underline;
            color: var(--primary);
            font-weight: bold;
        }
        .audit-link:hover { color: #60a5fa; }

        .hidden { display: none !important; }

        /* Modal Styles */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100;
            display: flex; align-items: center; justify-content: center; padding: 2rem;
        }
        .modal-content {
            background: var(--surface-color); padding: 2rem; border-radius: 1rem;
            max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto;
        }
        
        .audit-entry {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        /* Highly Optimized Print CSS */
        @media print {
            body { 
                background: white; 
                margin: 0; 
                padding: 0; 
            }
            .header, .table-container, #print-controls { 
                display: none !important; 
            }
            #printModal { 
                position: static; 
                background: white; 
                padding: 0; 
                display: block !important; 
            }
            .modal-content {
                background: white;
                box-shadow: none;
                padding: 0;
                max-width: none;
                overflow: visible;
                border-radius: 0;
            }
            #print-area {
                display: grid;
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 1rem !important;
                margin: 0 !important;
            }
            .card-wrapper {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>Testing Tracker</h1>
            <p id="last-updated" style="margin: 0; padding-top: 0.5rem; color: var(--text-muted); font-size: 0.85rem;">Connecting...</p>
        </div>
        <div class="controls">
            <label class="upload-btn">
                Import CSV
                <input type="file" id="csvFileInput" accept=".csv" style="display: none;">
            </label>
            <button onclick="exportData()">Export Data</button>
            <button onclick="showPrintModal()" style="background-color: var(--warning); color: black;">Print Cards</button>
        </div>
    </div>

    <!-- Print Modal -->
    <div id="printModal" class="modal hidden">
        <div class="modal-content">
            <div id="print-controls" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 style="margin: 0;">Print Student Cards</h2>
                <div>
                    <button onclick="window.print()" class="btn" style="background: var(--success); color: white;">Print Now</button>
                    <button onclick="document.getElementById('printModal').classList.add('hidden')" class="copy-btn">Close</button>
                </div>
            </div>
            <div id="print-area" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <!-- Cards generated here -->
            </div>
        </div>
    </div>

    <!-- Audit Modal -->
    <div id="auditModal" class="modal hidden">
        <div class="modal-content" style="max-width: 500px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 style="margin: 0;" id="audit-title">Test Log</h2>
                <button onclick="document.getElementById('auditModal').classList.add('hidden')" class="copy-btn">Close</button>
            </div>
            <div id="audit-area">
                <!-- Audit list goes here -->
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Name / Grade</th>
                    <th>Status / Progress</th>
                    <th>Tests Details</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="student-tbody">
                <!-- Rows injected here -->
            </tbody>
        </table>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const tbody = document.getElementById('student-tbody');
        let studentsData = [];

        async function loadData() {
            try {
                const res = await fetch('/api/dashboard');
                studentsData = await res.json();
                renderTable();
                document.getElementById('last-updated').innerText = `Last updated: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                console.error("Failed to load dashboard data", err);
            }
        }

        function getRequiredTestsList(s) {
            let tests = [];
            if(s.ela_1) tests.push("ELA-1");
            if(s.ela_2) tests.push("ELA-2");
            if(s.math_1) tests.push("MATH-1");
            if(s.math_2) tests.push("MATH-2");
            if(s.sci_1) tests.push("SCI-1");
            if(s.sci_2) tests.push("SCI-2");
            return tests;
        }

        function showPrintModal() {
            const modal = document.getElementById('printModal');
            const area = document.getElementById('print-area');
            modal.classList.remove('hidden');
            area.innerHTML = '';

            studentsData.forEach(s => {
                const card = document.createElement('div');
                card.className = "card-wrapper";
                card.style = "border: 1px solid #ccc; padding: 1rem; border-radius: 0.5rem; background: white; color: black; display: flex; align-items: center; gap: 1rem;";
                
                // Compress Boolean tests into a binary string for QR Code size efficiency
                // format: ID|Name|Grade|Phone|E1,E2,M1,M2,S1,S2|Is2Day|IsSelfDriver
                const binTests = [s.ela_1, s.ela_2, s.math_1, s.math_2, s.sci_1, s.sci_2].map(b => b ? 1 : 0).join(',');
                const qrData = `${s.id}|${s.name}|${s.grade || ''}|${s.parent_phone}|${binTests}|${s.is_two_day ? 'true' : 'false'}|${s.is_self_driver ? 'true' : 'false'}`;
                
                const qrDiv = document.createElement('div');
                new QRCode(qrDiv, { text: qrData, width: 110, height: 110 });
                card.appendChild(qrDiv);

                const requiredTestsStr = getRequiredTestsList(s).join(', ');

                const rightCol = document.createElement('div');
                rightCol.style.flex = "1";
                rightCol.innerHTML = `
                    <div style="font-weight: bold; font-size: 1.3rem; margin-bottom: 0.25rem;">${s.name} ${s.grade ? `(${s.grade})` : ''}</div>
                    <div style="font-family: monospace; font-size: 0.9rem; margin-bottom: 0.5rem; color: #444;">ID: ${s.id}</div>
                    <div style="font-family: monospace; font-size: 1.25rem; font-weight: bold; margin-bottom: 0.5rem; line-height: 1.4; background: #f1f5f9; padding: 0.5rem; border-radius: 0.25rem; display: inline-block;">
                        User: ${s.username} <br>Pass: ${s.password}
                    </div>
                    <div style="font-size: 0.85rem; color: #666; line-height: 1.4;">
                        <strong>Tests:</strong> ${requiredTestsStr}<br>
                        <strong>Plan:</strong> ${s.is_two_day ? '2-Day' : '1-Day'} | ${s.is_self_driver ? 'Self Driver' : 'Pickup'}
                    </div>
                `;
                
                card.appendChild(rightCol);
                area.appendChild(card);
            });
        }

        function showAuditModal(studentId) {
            const student = studentsData.find(s => s.id === studentId);
            if(!student) return;
            
            document.getElementById('audit-title').innerText = `Test Log: ${student.name}`;
            const area = document.getElementById('audit-area');
            area.innerHTML = '';
            
            if(student.scans.length === 0) {
                area.innerHTML = '<p>No records found.</p>';
            } else {
                student.scans.forEach(sc => {
                    const date = new Date(sc.timestamp);
                    const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    area.innerHTML += `
                        <div class="audit-entry">
                            <div style="font-weight: bold; color: var(--primary); width: 100px;">${sc.test_name}</div>
                            <div style="color: var(--text-muted); flex: 1;">${sc.teacher_name}</div>
                            <div style="font-family: monospace;">${timeStr}</div>
                        </div>
                    `;
                });
            }
            
            document.getElementById('auditModal').classList.remove('hidden');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
        }

        function renderTable() {
            tbody.innerHTML = '';
            
            // Sort logic: Last Name, then handle Checked-Out status
            const sortedData = [...studentsData].sort((a, b) => {
                const isCheckOutA = a.scans.some(s => s.test_name && s.test_name.startsWith('CHECK-OUT'));
                const isCheckOutB = b.scans.some(s => s.test_name && s.test_name.startsWith('CHECK-OUT'));

                // If check-out statuses differ, pushed checked-out to bottom
                if (isCheckOutA !== isCheckOutB) return isCheckOutA ? 1 : -1;

                // Otherwise sort by Last Name
                const getLastName = (name) => {
                    const parts = name.trim().split(' ');
                    return parts[parts.length - 1].toLowerCase();
                };
                return getLastName(a.name).localeCompare(getLastName(b.name));
            });

            sortedData.forEach(student => {
                const tr = document.createElement('tr');
                
                const required = getRequiredTestsList(student);
                const testScans = student.scans.filter(s => s.test_name !== 'CHECK-IN' && !s.test_name.startsWith('CHECK-OUT'));
                
                const counts = {};
                testScans.forEach(s => {
                    counts[s.test_name] = (counts[s.test_name] || 0) + 1;
                });
                
                const completedArray = [];
                Object.keys(counts).forEach(test => {
                    if (counts[test] > 1) {
                        completedArray.push(`<span style="color: var(--danger); font-weight: bold;">${test}(x${counts[test]})</span>`);
                    } else {
                        completedArray.push(test);
                    }
                });
                const completedStr = completedArray.join(', ');
                const uniqueCompletedRequired = Object.keys(counts).filter(test => required.includes(test)).length;

                const isCheckedIn = student.scans.some(s => s.test_name === 'CHECK-IN');
                
                let isLastTest = false;
                let statusHtml = '';

                const isCheckedOutDone = student.scans.some(s => s.test_name === 'CHECK-OUT-DONE');
                const isCheckedOutRet = student.scans.some(s => s.test_name === 'CHECK-OUT-RETURNING');
                const isCheckedOutLegacy = student.scans.some(s => s.test_name === 'CHECK-OUT');
                const isCheckedOut = isCheckedOutDone || isCheckedOutRet || isCheckedOutLegacy;

                if (isCheckedOutDone) {
                    statusHtml = `<span class="status-badge bg-gray">Done</span>`;
                } else if (isCheckedOutRet) {
                    statusHtml = `<span class="status-badge bg-gray">Returning</span>`;
                } else if (isCheckedOutLegacy) {
                    statusHtml = `<span class="status-badge bg-gray">Checked Out</span>`;
                } else if (!isCheckedIn) {
                    statusHtml = `<span class="status-badge bg-gray">Awaiting Check-in</span>`;
                } else {
                    const rem = required.length - uniqueCompletedRequired;
                    if (rem === 1) {
                        isLastTest = true;
                        statusHtml = `<span class="status-badge bg-orange">1-Test Left!</span>`;
                    } else if (rem <= 0) {
                        statusHtml = `<span class="status-badge bg-green">All Complete (${uniqueCompletedRequired}/${required.length})</span>`;
                    } else {
                        statusHtml = `<span class="status-badge bg-green">Checked In (${uniqueCompletedRequired}/${required.length})</span>`;
                    }
                }

                if (isLastTest) tr.className = 'row-warning';

                const isAllComplete = uniqueCompletedRequired >= required.length && required.length > 0;

                tr.innerHTML = `
                    <td style="font-family: monospace; color: ${isCheckedOut ? 'var(--text-muted)' : 'var(--primary)'}">
                        ${student.id}<br>
                        <span style="font-size: 0.7rem; color: var(--text-muted);">U: ${student.username}<br>P: ${student.password}</span>
                    </td>
                    <td style="color: ${isCheckedOut ? 'var(--text-muted)' : 'inherit'}">
                        <strong>${student.name}</strong> <span style="font-size: 0.8rem; opacity: 0.8;">${student.grade ? `Grade ${student.grade}` : ''}</span><br>
                        <span style="font-size: 0.75rem; color: var(--text-muted)">
                            ${student.is_two_day ? '2-Day Tester | ' : ''}
                            ${student.is_self_driver ? 'Self Driver | ' : ''}
                            ${student.parent_phone || 'No Phone'}
                        </span>
                    </td>
                    <td>${statusHtml}</td>
                    <td style="color: ${isCheckedOut ? 'var(--text-muted)' : 'inherit'}">
                        <div style="font-size: 0.8rem;">
                            <strong>Req:</strong> ${required.join(', ')}<br>
                            <strong>Done:</strong> <span class="audit-link" onclick="showAuditModal('${student.id}')">${completedStr || 'None'}</span>
                        </div>
                    </td>
                    <td>
                        <button onclick="copyToClipboard('${student.parent_phone}')" class="copy-btn">Copy Phone</button>
                        ${isLastTest && !student.is_self_driver && !isCheckedOut ? `<button onclick="copyToClipboard('Hello, ${student.name.split(' ')[0]} is on their last test and should be ready within 45 minutes.')" class="copy-btn" style="background: var(--warning); color: black;">Last Test</button>` : ''}
                        ${isAllComplete && !student.is_self_driver && !isCheckedOut ? `<button onclick="copyToClipboard('Hello, ${student.name.split(' ')[0]} has finished all their testing and is ready for pickup!')" class="copy-btn" style="background: var(--success); color: white;">Done!</button>` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // CSV Upload using regex to ignore commas inside quotes
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(event) {
                const text = event.target.result;
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                
                // Matches commas not inside quotes
                const regex = /(".*?"|[^",\s]+)(?=\s*,|\s*$)/g;
                
                // Fallback basic parser for headers
                const splitCsvLine = (str) => {
                    let p = '', row = [''], i = 0, r = 0, s = !0, l;
                    for (l of str) {
                        if ('"' === l) {
                            if (s && l === p) row[i] += l;
                            s = !s;
                        } else if (',' === l && s) l = row[++i] = '';
                        else row[i] += l;
                        p = l;
                    }
                    return row.map(x => x.trim().replace(/^"|"$/g, ''));
                };

                const headers = splitCsvLine(lines[0]).map(s => s.toLowerCase());
                const result = [];
                
                for(let i=1; i<lines.length; i++){
                    const values = splitCsvLine(lines[i]);
                    const obj = {};
                    headers.forEach((h, idx) => {
                        obj[h] = values[idx] || '';
                    });
                    
                    if (!obj.id) continue;
                    
                    const toBool = (val) => val.toLowerCase() === 'yes' || val.toLowerCase() === 'true';

                    result.push({
                        id: obj.id, 
                        name: obj.name,
                        username: obj.username,
                        password: obj.password,
                        grade: obj.grade,
                        parent_phone: obj.parent_phone,
                        ela_1: toBool(obj.ela_1),
                        ela_2: toBool(obj.ela_2),
                        math_1: toBool(obj.math_1),
                        math_2: toBool(obj.math_2),
                        sci_1: toBool(obj.sci_1),
                        sci_2: toBool(obj.sci_2),
                        is_two_day: toBool(obj.is_two_day),
                        is_self_driver: toBool(obj.is_self_driver)
                    });
                }

                try {
                    await fetch('/api/import', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ students: result })
                    });
                    alert(`Imported ${result.length} students successfully.`);
                    loadData();
                } catch (err) {
                    alert('Import failed.');
                    console.error(err);
                }
            };
            reader.readAsText(file);
        });

        // Simple CSV export
        function exportData() {
            let csvContent = "data:text/csv;charset=utf-8,";
            const headers = [
                "ID", "Name", "Username", "Password", "Grade", "Phone",
                "Check-In Time", "Check-Out Time",
                "ELA-1", "ELA-1 Completion",
                "ELA-2", "ELA-2 Completion",
                "MATH-1", "MATH-1 Completion",
                "MATH-2", "MATH-2 Completion",
                "SCI-1", "SCI-1 Completion",
                "SCI-2", "SCI-2 Completion",
                "Status", "Two-Day", "Self-Driver"
            ];
            csvContent += headers.join(",") + "\n";
            
            studentsData.forEach(s => {
                const checkedOutStatus = s.scans.some(sc => sc.test_name === 'CHECK-OUT-DONE') ? 'Done' :
                                         s.scans.some(sc => sc.test_name === 'CHECK-OUT-RETURNING') ? 'Returning' :
                                         s.scans.some(sc => sc.test_name === 'CHECK-OUT') ? 'Checked Out' : 'Active';
                
                const getTestTime = (testName) => {
                    const scan = s.scans.find(sc => sc.test_name === testName);
                    if (!scan) return "";
                    const date = new Date(scan.timestamp);
                    return date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                };

                const checkoutTime = getTestTime('CHECK-OUT-DONE') || getTestTime('CHECK-OUT-RETURNING') || getTestTime('CHECK-OUT');

                const row = [
                    s.id, s.name, s.username, s.password, s.grade, s.parent_phone, 
                    getTestTime('CHECK-IN'), checkoutTime,
                    s.ela_1?'Yes':'No', getTestTime('ELA-1'),
                    s.ela_2?'Yes':'No', getTestTime('ELA-2'),
                    s.math_1?'Yes':'No', getTestTime('MATH-1'),
                    s.math_2?'Yes':'No', getTestTime('MATH-2'),
                    s.sci_1?'Yes':'No', getTestTime('SCI-1'),
                    s.sci_2?'Yes':'No', getTestTime('SCI-2'),
                    checkedOutStatus,
                    s.is_two_day ? 'Yes' : 'No', s.is_self_driver ? 'Yes' : 'No'
                ].map(x => `"${x || ''}"`).join(',');
                
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Testing_Log_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
        }

        setInterval(loadData, 5000);
        loadData();
    </script>
</body>
</html>
