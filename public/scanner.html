<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="/utils.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #setup-container {
            display: flex;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        #setup-container input {
            padding: 1rem;
            font-size: 1.2rem;
            border-radius: 0.5rem;
            border: 1px solid var(--text-muted);
            margin-bottom: 1rem;
            width: 100%;
            max-width: 300px;
        }

        #reader-container {
            flex: 1;
            display: none; /* hidden until setup completes */
            flex-direction: column;
        }
        
        #reader {
            width: 100%;
            flex: 1;
            background: #000;
        }

        #action-container {
            display: none;
            padding: 1.5rem;
            flex: 1;
            flex-direction: column;
            background-color: var(--surface-color);
            overflow-y: auto;
        }

        #success-container {
            display: none;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--success);
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

        .student-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .student-header h2 { margin: 0; font-size: 1.8rem; }
        .student-header p { margin: 0.5rem 0 0; color: var(--text-muted); }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            margin-bottom: 0.75rem;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn.btn-outline {
            background-color: transparent;
            border: 2px solid var(--text-muted);
            color: var(--text-muted);
        }

        .btn.btn-success { background-color: var(--success); }

        .info-card {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div id="setup-container">
        <h2>Welcome to Testing Tracker</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Please enter your name to log tests securely.</p>
        <input type="text" id="teacher-name-input" placeholder="e.g. Mr. Smith">
        <button class="btn" style="max-width: 300px;" onclick="saveTeacherName()">Start Scanning</button>
    </div>

    <div id="reader-container">
        <div style="padding: 1rem; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid #333;">
            <p style="margin: 0; font-weight: 600;" id="scan-header-title">Scanner</p>
            <button onclick="changeTeacher()" style="background: transparent; border: 1px solid #666; color: white; border-radius: 0.25rem; padding: 0.25rem 0.5rem;">Change</button>
        </div>
        <div id="reader"></div>
    </div>

    <div id="action-container">
        <div class="student-header">
            <h2 id="s-name">Student Name</h2>
            <p id="s-id">ID: 12345</p>
        </div>

        <div id="selection-view" style="display: none;">
            <div class="info-card" id="s-info-card"></div>
            
            <button class="btn btn-outline" style="border-color: var(--primary); color: var(--text-main);" onclick="submitAction('CHECK-IN')">📍 Front Desk Check-In</button>

            <h3 style="margin-top: 1rem; margin-bottom: 0.5rem;">Log Completed Test</h3>
            <div id="test-buttons"></div>
            
            <hr style="border-color: #334155; margin: 1.5rem 0;">
            <button class="btn btn-success" onclick="submitAction('CHECK-OUT')" id="btn-checkout">Check-Out / Leaving</button>
            <button class="btn btn-outline" style="border-color: var(--danger); color: var(--danger);" onclick="cancelAction()">Cancel Scan</button>
        </div>
    </div>

    <div id="success-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <div>Success!</div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbxTvfYtcdY732FaG3VN3UKf7i7jtwj3DUIhmyvhkA6gsofX8VIv9V1tQGDCI9MscTcYEw/exec";
        let html5QrcodeScanner;
        let currentStudent = null;
        let teacherName = "";

        window.addEventListener('load', () => {
            teacherName = window.localStorage.getItem('teacherName');
            if (teacherName) {
                document.getElementById('setup-container').style.display = 'none';
                document.getElementById('reader-container').style.display = 'flex';
                document.getElementById('scan-header-title').innerText = `Scanner (${teacherName})`;
                initScanner();
            }
        });

        function saveTeacherName() {
            const input = document.getElementById('teacher-name-input').value.trim();
            if (!input) {
                alert("Please enter a name.");
                return;
            }
            teacherName = input;
            window.localStorage.setItem('teacherName', teacherName);
            document.getElementById('setup-container').style.display = 'none';
            document.getElementById('reader-container').style.display = 'flex';
            document.getElementById('scan-header-title').innerText = `Scanner (${teacherName})`;
            initScanner();
        }

        function changeTeacher() {
            window.localStorage.removeItem('teacherName');
            location.reload();
        }

        function initScanner() {
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
                html5QrcodeScanner.render(onScanSuccess);
            }
        }

        function onScanSuccess(decodedText) {
            html5QrcodeScanner.pause(true);
            
            // Format: ID | Name | Grade | Phone | E1,E2,M1,M2,S1,S2 | Is2Day | IsSelf
            const parts = decodedText.split('|').map(s => s.trim());
            if (parts.length < 5) {
                currentStudent = { id: parts[0], name: "Student " + parts[0], grade: "", phone: "", requiredTests: [], is2Day: false, isSelf: false };
            } else {
                const booleans = parts[4].split(',').map(n => n === '1');
                const testNames = ["ELA-1", "ELA-2", "MATH-1", "MATH-2", "SCI-1", "SCI-2"];
                const reqs = [];
                booleans.forEach((b, idx) => { if(b) reqs.push(testNames[idx]); });

                currentStudent = {
                    id: parts[0],
                    name: parts[1],
                    grade: parts[2] || "",
                    phone: parts[3] || "",
                    requiredTests: reqs,
                    is2Day: parts[5] === 'true',
                    isSelf: parts[6] === 'true'
                };
            }

            showActionUI();
        }

        function showActionUI() {
            document.getElementById('reader-container').style.display = 'none';
            document.getElementById('action-container').style.display = 'flex';
            document.getElementById('selection-view').style.display = 'block';

            document.getElementById('s-name').innerText = currentStudent.name + (currentStudent.grade ? ` (Grade ${currentStudent.grade})` : '');
            document.getElementById('s-id').innerText = `ID: ${currentStudent.id}`;

            document.getElementById('s-info-card').innerHTML = `
                <strong>Contact:</strong> ${currentStudent.phone || 'N/A'}<br>
                <strong>Plan:</strong> ${currentStudent.is2Day ? '2-Day' : '1-Day'} | ${currentStudent.isSelf ? 'Self Driver' : 'Pickup Needed'}
            `;

            const container = document.getElementById('test-buttons');
            container.innerHTML = '';
            
            if (currentStudent.requiredTests.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); margin: 0;">No tests required.</p>';
            } else {
                const pairs = [
                    ["ELA-1", "ELA-2"],
                    ["MATH-1", "MATH-2"],
                    ["SCI-1", "SCI-2"]
                ];
                
                pairs.forEach(pair => {
                    const reqs = pair.filter(t => currentStudent.requiredTests.includes(t));
                    if (reqs.length > 0) {
                        const rowDiv = document.createElement('div');
                        rowDiv.style.display = 'flex';
                        rowDiv.style.gap = '0.75rem';
                        rowDiv.style.marginBottom = '0.75rem';
                        
                        reqs.forEach(test => {
                            const btn = document.createElement('button');
                            btn.className = 'btn';
                            btn.style.flex = '1';
                            btn.style.margin = '0';
                            btn.style.padding = '1.5rem 1rem';
                            btn.style.fontSize = '1.25rem';
                            btn.innerText = test;
                            btn.onclick = () => submitAction('TEST_COMPLETE', test);
                            rowDiv.appendChild(btn);
                        });
                        
                        container.appendChild(rowDiv);
                    }
                });
            }
        }

        function cancelAction() {
            document.getElementById('action-container').style.display = 'none';
            document.getElementById('reader-container').style.display = 'flex';
            html5QrcodeScanner.resume();
        }

        function submitAction(actionType, testName = '') {
            // 1. Optimistic UI context hooks
            if (actionType === 'CHECK-IN' || actionType === 'CHECK-OUT') {
                playFunSong();
            } else {
                playTada();
            }

            // 2. Hide modal, show success
            document.getElementById('action-container').style.display = 'none';
            document.getElementById('selection-view').style.display = 'none';
            document.getElementById('success-container').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('success-container').style.display = 'none';
                document.getElementById('reader-container').style.display = 'flex';
                html5QrcodeScanner.resume();
            }, 1500);

            // 3. Fire-and-forget Network Request
            // Google Apps Script performs a redirect after a successful POST. 
            // Setting application/json with default CORS handling correctly delivers the payload,
            // even though the subsequent redirect fails in the browser. We catch and ignore the redirect failure error.
            fetch(CLOUD_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    student_id: currentStudent.id,
                    action: actionType,
                    test_name: testName,
                    teacher_name: teacherName
                })
            }).catch(e => console.log("CORS redirect ignored. Payload delivered:", actionType));
        }
    </script>
</body>
</html>
