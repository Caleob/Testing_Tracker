<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="/utils.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #reader-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        #reader {
            width: 100%;
            flex: 1;
            background: #000;
        }

        #action-container {
            display: none;
            padding: 1.5rem;
            flex: 1;
            flex-direction: column;
            background-color: var(--surface-color);
            overflow-y: auto;
        }

        #success-container {
            display: none;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--success);
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

        .student-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .student-header h2 { margin: 0; font-size: 1.8rem; }
        .student-header p { margin: 0.5rem 0 0; color: var(--text-muted); }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            margin-bottom: 0.75rem;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn.btn-outline {
            background-color: transparent;
            border: 2px solid var(--text-muted);
            color: var(--text-muted);
        }

        .btn.btn-success { background-color: var(--success); }

        .info-card {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div id="reader-container">
        <div style="padding: 1rem; text-align: center; background: #000; border-bottom: 1px solid #333;">
            <p style="margin: 0; font-weight: 600;">Scan Student Card</p>
        </div>
        <div id="reader"></div>
    </div>

    <div id="action-container">
        <div class="student-header">
            <h2 id="s-name">Student Name</h2>
            <p id="s-id">ID: 12345</p>
        </div>

        <div id="checkin-view" style="display: none;">
            <div class="info-card" id="s-info-card"></div>
            <p style="color: var(--text-muted); font-size: 0.85rem; text-align: center; margin-bottom: 1rem;">
                Please verify this info is correct. If any details are wrong, notify the Check-In Desk to edit it.
            </p>
            <button class="btn btn-success" onclick="submitAction('CHECK-IN')">Confirm details & Check In</button>
            <button class="btn btn-outline" onclick="cancelAction()">Cancel</button>
        </div>

        <div id="test-view" style="display: none;">
            <h3 style="margin-top: 0;">Log Completed Test</h3>
            <div id="test-buttons"></div>
            <hr style="border-color: #334155; margin: 1.5rem 0;">
            <button class="btn btn-success" onclick="submitAction('CHECK-OUT')" id="btn-checkout">Check-Out / Leaving</button>
            <button class="btn btn-outline" onclick="cancelAction()">Cancel</button>
        </div>
    </div>

    <div id="success-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <div>Success!</div>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbxTvfYtcdY732FaG3VN3UKf7i7jtwj3DUIhmyvhkA6gsofX8VIv9V1tQGDCI9MscTcYEw/exec";
        let html5QrcodeScanner;
        let currentStudent = null;

        window.addEventListener('load', () => {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
            html5QrcodeScanner.render(onScanSuccess);
        });

        function onScanSuccess(decodedText) {
            html5QrcodeScanner.pause(true);
            
            // Format: ID | Name | Grade | Tests | Phone | Is2Day | IsSelfDriver
            const parts = decodedText.split('|').map(s => s.trim());
            if (parts.length < 2) {
                // Fallback for ID-only scans
                currentStudent = { id: parts[0], name: "Student " + parts[0], grade: "", tests: "", phone: "", is2Day: false, isSelf: false, checked_in: true };
            } else {
                currentStudent = {
                    id: parts[0],
                    name: parts[1],
                    grade: parts[2] || "",
                    tests: parts[3] || "",
                    phone: parts[4] || "",
                    is2Day: parts[5] === 'true',
                    isSelf: parts[6] === 'true',
                    checked_in: false // will be overwritten locally if we had a sync, but we use the pipe-info
                };
            }

            // Check if we've seen this student before in THIS session (optional)
            // For MVP, we'll assume the QR data is the source of truth for the phone
            showActionUI();
        }

        function showActionUI() {
            document.getElementById('reader-container').style.display = 'none';
            document.getElementById('action-container').style.display = 'flex';

            document.getElementById('s-name').innerText = currentStudent.name + (currentStudent.grade ? ` (Grade ${currentStudent.grade})` : '');
            document.getElementById('s-id').innerText = `ID: ${currentStudent.id}`;

            const requiredTests = currentStudent.tests ? currentStudent.tests.split(',').filter(x=>x) : [];
            
            // Logic: If they have ID|Name etc, we show Check-In. 
            // If it's just ID, we skip to test view.
            if (currentStudent.tests && !window.localStorage.getItem('checked_in_' + currentStudent.id)) {
                document.getElementById('checkin-view').style.display = 'block';
                document.getElementById('test-view').style.display = 'none';
                document.getElementById('s-info-card').innerHTML = `
                    <strong>Contact:</strong> ${currentStudent.phone || 'N/A'}<br>
                    <strong>Tests:</strong> ${requiredTests.join(', ')}<br>
                    <strong>Plan:</strong> ${currentStudent.is2Day ? '2-Day' : '1-Day'} | ${currentStudent.isSelf ? 'Self Driver' : 'Pickup Needed'}
                `;
            } else {
                document.getElementById('checkin-view').style.display = 'none';
                document.getElementById('test-view').style.display = 'block';
                const container = document.getElementById('test-buttons');
                container.innerHTML = '';
                requiredTests.forEach(test => {
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerText = `Complete: ${test}`;
                    btn.onclick = () => submitAction('TEST_COMPLETE', test);
                    container.appendChild(btn);
                });
            }
        }

        function cancelAction() {
            document.getElementById('action-container').style.display = 'none';
            document.getElementById('reader-container').style.display = 'flex';
            html5QrcodeScanner.resume();
        }

        async function submitAction(actionType, testName = '') {
            try {
                // Send to Cloud Relay
                await fetch(CLOUD_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Critical for Google Apps Script POSTs
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        student_id: currentStudent.id,
                        action: actionType,
                        test_name: testName
                    })
                });

                if (actionType === 'CHECK-IN' || actionType === 'CHECK-OUT') {
                    playFunSong();
                    if (actionType === 'CHECK-IN') window.localStorage.setItem('checked_in_' + currentStudent.id, 'true');
                } else {
                    playTada();
                }

                document.getElementById('action-container').style.display = 'none';
                document.getElementById('success-container').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('success-container').style.display = 'none';
                    document.getElementById('reader-container').style.display = 'flex';
                    html5QrcodeScanner.resume();
                }, 1500);
            } catch (err) {
                alert("Submission failed. Check internet.");
            }
        }
    </script>
</body>
</html>
